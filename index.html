<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a3a2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Score Cekih" />
  <title>Score Cekih — Sadewa Corp</title>
  <link rel="icon" type="image/x-icon" href="images/joker.ico" />
  <link rel="apple-touch-icon" href="images/joker.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===================== LOADING SCREEN ===================== -->
<div id="loading-screen">
  <div class="loading-content">
    <div class="loading-logo-wrap">
      <img src="images/joker.png" alt="Joker Logo" id="loading-logo" />
      <div class="loading-glow-ring"></div>
    </div>
    <h1 class="loading-title">SCORE CEKIH</h1>
    <p class="loading-sub">by Sadewa Corp</p>
    <div class="loading-bar-wrap">
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar-fill"></div>
      </div>
      <span class="loading-pct" id="loading-pct">0%</span>
    </div>
  </div>
</div>

<!-- ===================== CARD MOTIF OVERLAY ===================== -->
<div class="card-motif-overlay" aria-hidden="true">
  <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
  <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
  <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
  <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
  <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
  <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="app" class="hidden">

  <!-- ===== SETUP PAGE ===== -->
  <div id="page-setup" class="page active">
    <div class="setup-header">
      <img src="images/joker.png" alt="Logo" class="setup-logo" />
      <h1 class="setup-title">SCORE CEKIH</h1>
      <p class="setup-sub">by Sadewa Corp</p>
    </div>
    <div class="setup-form">
      <div class="setup-field">
        <label>Pemain 1 (Dragon 🐉)</label>
        <input type="text" id="setup-p1" placeholder="Nama Pemain 1" maxlength="20" />
      </div>
      <div class="setup-field">
        <label>Pemain 2 (Tiger 🐯)</label>
        <input type="text" id="setup-p2" placeholder="Nama Pemain 2" maxlength="20" />
      </div>
      <div class="setup-field">
        <label>Pemain 3 (Eagle 🦅)</label>
        <input type="text" id="setup-p3" placeholder="Nama Pemain 3" maxlength="20" />
      </div>
      <div class="setup-field">
        <label>Pemain 4 (Cobra 🐍)</label>
        <input type="text" id="setup-p4" placeholder="Nama Pemain 4" maxlength="20" />
      </div>
      <div class="setup-field">
        <label>Target Kemenangan</label>
        <div class="target-options">
          <button class="target-btn" data-val="500">500</button>
          <button class="target-btn" data-val="750">750</button>
          <button class="target-btn active" data-val="1000">1000</button>
          <button class="target-btn" data-val="1500">1500</button>
        </div>
        <input type="number" id="setup-target-custom" placeholder="Custom target..." min="100" max="9999" />
      </div>
      <button class="btn-primary btn-start" id="btn-start-game">🃏 START GAME</button>
    </div>
  </div>

  <!-- ===== GAME PAGE ===== -->
  <div id="page-game" class="page">

    <!-- Header -->
    <div class="game-header">
      <div class="game-header-left">
        <img src="images/joker.png" alt="Logo" class="header-logo" />
        <div class="header-info">
          <span class="header-title">SCORE CEKIH</span>
          <span class="header-round" id="header-round">Ronde 1 · Turn 1</span>
        </div>
      </div>
      <div class="game-header-right">
        <button class="icon-btn" id="btn-bg-music" title="Toggle Music">🎵</button>
        <button class="icon-btn" id="btn-fullscreen" title="Fullscreen">⛶</button>
        <button class="icon-btn" id="btn-screenshot" title="Screenshot">📸</button>
        <button class="icon-btn" id="btn-edit-names" title="Edit Names">✏️</button>
      </div>
    </div>

    <!-- Player Cards + Attack Canvas wrapper -->
    <div class="cards-wrapper" id="cards-wrapper">
      <!-- Player Cards Grid -->
      <div class="cards-grid" id="cards-grid">
        <!-- Generated by JS -->
      </div>
      <!-- Attack animation projectile layer -->
      <canvas id="attack-canvas" class="attack-canvas"></canvas>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <button class="btn-save-turn" id="btn-save-turn">💾 SAVE TURN</button>
      <div class="action-row2">
        <button class="btn-undo" id="btn-undo">↩️ UNDO</button>
        <button class="btn-reset" id="btn-reset">🗑 RESET</button>
      </div>
    </div>

    <!-- Burn Panel -->
    <div id="burn-panel" class="burn-panel hidden">
      <div class="burn-panel-header">🔥 BURN CANDIDATES</div>
      <div id="burn-candidates-list" class="burn-candidates-list"></div>
      <div class="burn-panel-actions">
        <button class="btn-confirm-burn" id="btn-confirm-burn">✅ CONFIRM BURN</button>
        <button class="btn-cancel-burn" id="btn-cancel-burn">❌ Cancel</button>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="tab-ranking">🏆 Ranking</button>
      <button class="tab-btn" data-tab="tab-history">📜 History</button>
      <button class="tab-btn" data-tab="tab-achievements">🎖 Achievement</button>
      <button class="tab-btn" data-tab="tab-stats">📊 Stats</button>
      <button class="tab-btn" data-tab="tab-archive">👥 Archive</button>
      <button class="tab-btn" data-tab="tab-chart">📈 Chart</button>
    </div>

    <!-- Tab Panels -->
    <div class="tab-panels">
      <div class="tab-panel active" id="tab-ranking">
        <div id="ranking-list" class="ranking-list"></div>
      </div>
      <div class="tab-panel" id="tab-history">
        <div id="history-list" class="history-list"></div>
      </div>
      <div class="tab-panel" id="tab-achievements">
        <div id="achievements-list" class="achievements-list"></div>
      </div>
      <div class="tab-panel" id="tab-stats">
        <div id="stats-list" class="stats-list"></div>
      </div>
      <div class="tab-panel" id="tab-archive">
        <div id="archive-list" class="archive-list"></div>
      </div>
      <div class="tab-panel" id="tab-chart">
        <canvas id="score-chart" class="score-chart"></canvas>
      </div>
    </div>

    <!-- AI Commentator -->
    <div class="ai-comment-bar" id="ai-comment-bar">
      <span class="ai-icon">🤖</span>
      <span id="ai-comment-text">Permainan dimulai! Semoga beruntung!</span>
    </div>

  </div>

  <!-- ===== NEW ROUND SETUP PAGE ===== -->
  <div id="page-new-round" class="page">
    <div class="setup-header">
      <img src="images/joker.png" alt="Logo" class="setup-logo" />
      <h1 class="setup-title">RONDE BARU</h1>
      <p class="setup-sub" id="new-round-num">Ronde 2</p>
    </div>
    <div class="setup-form">
      <p class="new-round-desc">Gunakan pemain sebelumnya atau ganti?</p>
      <div id="new-round-players" class="new-round-players">
        <!-- Generated by JS -->
      </div>
      <div class="setup-field">
        <label>Target Kemenangan</label>
        <div class="target-options" id="nr-target-options">
          <button class="target-btn" data-val="500">500</button>
          <button class="target-btn" data-val="750">750</button>
          <button class="target-btn active" data-val="1000">1000</button>
          <button class="target-btn" data-val="1500">1500</button>
        </div>
        <input type="number" id="nr-target-custom" placeholder="Custom target..." min="100" max="9999" />
      </div>
      <button class="btn-primary btn-start" id="btn-start-new-round">🃏 MULAI RONDE BARU</button>
    </div>
  </div>

</div>

<!-- ===== EDIT NAME MODAL ===== -->
<div id="modal-edit-name" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 class="modal-title">✏️ Edit Nama Pemain</h2>
    <div id="edit-name-fields"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="btn-save-names">💾 Simpan</button>
      <button class="btn-secondary" id="btn-cancel-edit-name">Batal</button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM MODAL ===== -->
<div id="modal-confirm" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 class="modal-title" id="confirm-title">Konfirmasi</h2>
    <p class="modal-body" id="confirm-body"></p>
    <div class="modal-actions">
      <button class="btn-danger" id="btn-confirm-yes">Ya</button>
      <button class="btn-secondary" id="btn-confirm-no">Tidak</button>
    </div>
  </div>
</div>

<!-- ===== REWARD VIDEO OVERLAY ===== -->
<div id="reward-overlay" class="reward-overlay hidden">
  <div class="gold-flash" id="gold-flash"></div>
  <video id="reward-video" playsinline muted></video>
  <div class="reward-winner-label" id="reward-winner-label"></div>
</div>

<!-- ===== SCREEN SHAKE OVERLAY ===== -->
<div id="screen-shake-el" class="screen-shake-el"></div>

<!-- ===== CRITICAL DAMAGE TEXT ===== -->
<div id="critical-damage-text" class="critical-damage-text hidden"></div>

<script src="app.js"></script>
</body>
</html>
